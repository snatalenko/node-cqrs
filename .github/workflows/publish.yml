name: Publish to NPM

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm i -g npm@latest

      - name: Install dependencies
        run: npm ci --no-optional

      - name: Publish to NPM
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG=""

          if [[ "$VERSION" == *-* ]]; then
            # e.g. "1.0.0-rc.1" → "rc", "1.0.0-beta.2" → "beta"
            PREID="${VERSION#*-}"
            PREID="${PREID%%.*}"
            # purely numeric pre-id (e.g. "1.0.0-1") → "alpha"
            [[ "$PREID" =~ ^[0-9]+$ ]] && PREID=alpha
            TAG="--tag $PREID"
          fi

          npm publish --provenance $TAG
